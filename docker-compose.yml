# Local development services for the Tripu self-hosted backend.
# Bring up Postgres with:  docker compose up -d
services:
  db:
    image: postgres:16-alpine
    container_name: tripu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tripu
      POSTGRES_PASSWORD: tripu
      POSTGRES_DB: tripu
    ports:
      - "5432:5432"
    volumes:
      - tripu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripu -d tripu"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tripu_pgdata:
